name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      # Cache HuggingFace models so subsequent runs skip the download.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: hf-${{ runner.os }}-

      - name: Syntax-check all modules
        run: |
          python -m compileall -q \
            config.py api.py app.py evaluate.py analyze_logs.py \
            build_benchmark.py build_output_benchmark.py \
            src training

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  benchmark:
    name: Benchmark evaluation
    runs-on: ubuntu-latest
    # Run benchmark on pushes to main only to save CI minutes
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: hf-${{ runner.os }}-

      - name: Run benchmark (seed evaluation set, rule-based paths)
        run: python evaluate.py --data data/test_prompts.json

      - name: Run 900-prompt benchmark
        run: python evaluate.py --data benchmark_900.json
        continue-on-error: true   # models may not load fully in CI; rule-based baseline still reported

      - name: Run held-out generalization probe (novel unseen phrasings)
        run: python evaluate.py --data data/heldout_novel.json
        continue-on-error: true   # measurement only; not tuned against
